# gam's golden set for the Stage-1 regression gate.
# These checks are DETERMINISTIC, so 1 seed is enough (multi-seed is for stochastic
# agents). Each task has an explicit timeout so a hung command is bounded, not forever.
# Generate the baseline ON A MAC (Linux CI/sandbox can't run gam's native
# rollup/esbuild/Tauri binaries):
#   awh eval .awh/goldenset.yaml --seeds 1 --out .awh/eval-baseline.json
tasks:
  - id: vitest
    description: unit suite passes (vitest run)
    cmd: "pnpm test"
    weight: 3.0
    timeout_sec: 300

  - id: lint
    description: cyberskill lint reports no issues
    cmd: "pnpm lint"
    weight: 1.0
    timeout_sec: 180

  - id: typecheck
    description: TypeScript type-checks with no errors
    cmd: "pnpm exec tsc --noEmit -p tsconfig.json"
    weight: 1.0
    timeout_sec: 180
