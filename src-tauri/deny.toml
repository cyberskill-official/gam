# cargo-deny configuration for gam's Rust dependency tree.
# Run locally:  cargo deny --manifest-path src-tauri/Cargo.toml check
# CI runs the same check (see .github/workflows/check.yml).
#
# This gates dependencies on four axes: known security advisories, license
# policy, banned/duplicate crates, and trusted sources.

[advisories]
version = 2
# Fail on any yanked crate in the lockfile.
yanked = "deny"
# Only fail on unmaintained crates that gam itself depends on. The Tauri and GTK
# stack carries many transitive unmaintained crates (gtk-rs, unic-*, fxhash) with
# no safe upgrade; those are upstream and cannot be fixed from gam.
unmaintained = "workspace"
# Add RUSTSEC-XXXX-XXXX ids here, with a comment, to consciously accept a finding.
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses acceptable for a distributed desktop app.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
# Per-crate license exceptions go here if ever needed.
exceptions = []

[bans]
# Tauri's tree legitimately carries some duplicate versions; surface them as a
# warning rather than a hard failure.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [ "https://github.com/rust-lang/crates.io-index" ]
